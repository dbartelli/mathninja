<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MathNinja">
  <title>MathNinja</title>
  <style>
    :root {
      --bg:    #1a1a2e;
      --bg2:   #16213e;
      --bg3:   #2a2a4e;
      --red:   #e94560;
      --red-dark: #c23152;
      --teal:  #00b4d8;
      --gold:  #ffd166;
      --green: #4ade80;
      --text:  #e0e0e0;
      --muted: #555555;
      --font:  system-ui, -apple-system, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-tap-highlight-color: transparent;
    }
    .screen { display: none; min-height: 100vh; }
    .screen.active { display: block; }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }

    /* ── Branding ── */
    .brand { text-align: center; padding: 12px 0 20px; }
    .brand-ninja { font-size: 52px; line-height: 1; margin-bottom: 6px; }
    .brand-title {
      font-size: 32px; font-weight: 900; letter-spacing: 4px;
      color: var(--gold); text-transform: uppercase;
    }
    .brand-tagline {
      font-size: 13px; font-weight: 600; color: var(--red);
      letter-spacing: 0.5px; margin-top: 8px;
    }
    .divider { border: none; border-top: 1px solid var(--bg3); margin: 0 0 24px; }
    fieldset { border: none; padding: 0; margin: 0; }

    /* ── Setting sections ── */
    .setting-section { margin-bottom: 24px; }
    .setting-label {
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--teal); margin-bottom: 10px;
    }

    /* ── Toggle buttons ── */
    .toggle-group { display: flex; gap: 8px; }
    .toggle-btn {
      flex: 1; background: var(--bg2); color: var(--muted);
      border: 2px solid var(--bg3); border-radius: 10px;
      padding: 12px 8px; font-size: 14px; font-weight: 800;
      font-family: var(--font); cursor: pointer;
      min-height: 44px; transition: all 0.15s;
    }
    .toggle-btn.active {
      background: var(--red); color: white; border-color: var(--red);
    }

    /* ── Number grid ── */
    .number-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px;
    }
    .num-btn {
      background: var(--bg2); color: var(--muted);
      border: 2px solid var(--bg3); border-radius: 8px;
      padding: 0; font-size: 17px; font-weight: 800;
      font-family: var(--font); cursor: pointer; text-align: center;
      height: 44px; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .num-btn.selected { background: var(--red); color: white; border-color: var(--red); }
    .grid-hint { font-size: 11px; color: var(--muted); text-align: center; margin-top: 8px; }

    /* ── Session stepper ── */
    .session-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .stepper { display: flex; align-items: center; gap: 10px; }
    .stepper-btn {
      background: var(--bg2); color: var(--text); border: 2px solid var(--bg3);
      border-radius: 8px; width: 44px; height: 44px; font-size: 22px;
      font-weight: 700; font-family: var(--font); cursor: pointer; line-height: 1;
    }
    .stepper-btn:active { opacity: 0.6; }
    .stepper-val { font-size: 22px; font-weight: 900; min-width: 48px; text-align: center; }

    /* ── Enter Dojo button ── */
    .dojo-btn {
      width: 100%; padding: 18px; font-size: 20px; font-weight: 900;
      font-family: var(--font); letter-spacing: 2px; color: white;
      background: linear-gradient(135deg, var(--red), var(--red-dark));
      border: none; border-radius: 14px; cursor: pointer; margin-top: 8px;
      box-shadow: 0 4px 20px rgba(233,69,96,0.4);
      min-height: 56px; transition: opacity 0.15s;
    }
    .dojo-btn:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }

    /* ── Sound toggle ── */
    .sound-row {
      text-align: center; margin-top: 14px; color: var(--muted);
      font-size: 12px; cursor: pointer; -webkit-user-select: none; user-select: none;
      background: none; border: none; width: 100%; font-family: var(--font);
    }
  </style>
</head>
<body>

  <div id="screen-settings" class="screen active">
    <div class="container">

      <!-- Branding -->
      <div class="brand">
        <div class="brand-ninja">🥷</div>
        <h1 class="brand-title">MATHNINJA</h1>
        <p class="brand-tagline">⚔️ Welcome to Diego's Math Dojo. Select your training. ⚔️</p>
      </div>
      <hr class="divider">

      <!-- Operation mode -->
      <fieldset class="setting-section">
        <legend class="setting-label">⚡ Operation</legend>
        <div class="toggle-group" id="op-toggle">
          <button type="button" class="toggle-btn active" data-op="multiply" aria-pressed="true">✖️ Multiply</button>
          <button type="button" class="toggle-btn" data-op="divide" aria-pressed="false">➗ Divide</button>
          <button type="button" class="toggle-btn" data-op="mix" aria-pressed="false">🔀 Mix</button>
        </div>
      </fieldset>

      <!-- Numbers to train -->
      <fieldset class="setting-section">
        <legend class="setting-label">🎯 Numbers to Train</legend>
        <div class="number-grid" id="number-grid"></div>
        <p class="grid-hint">Select at least 2 numbers</p>
      </fieldset>

      <!-- Session length -->
      <fieldset class="setting-section">
        <legend class="setting-label">⏱ Session Length</legend>
        <div class="session-row">
          <div class="toggle-group" id="st-toggle">
            <button type="button" class="toggle-btn active" data-st="problems" aria-pressed="true">📋 Problems</button>
            <button type="button" class="toggle-btn" data-st="time" aria-pressed="false">⏱ Time</button>
          </div>
          <div class="stepper">
            <button type="button" class="stepper-btn" id="stepper-minus">−</button>
            <span class="stepper-val" id="session-display">20</span>
            <button type="button" class="stepper-btn" id="stepper-plus">+</button>
          </div>
        </div>
      </fieldset>

      <!-- Enter Dojo -->
      <button type="button" class="dojo-btn" id="dojo-btn">⚔️ ENTER DOJO ⚔️</button>
      <button type="button" class="sound-row" id="sound-toggle-row" aria-pressed="false">
        <span id="sound-icon">🔊</span>
        <span id="sound-label">Sound On</span>
      </button>

    </div>
  </div>

  <div id="screen-practice" class="screen">
    <div class="container">
      <p style="color:var(--teal)">Practice screen — coming soon</p>
    </div>
  </div>

  <div id="screen-results" class="screen">
    <div class="container">
      <p style="color:var(--teal)">Results screen — coming soon</p>
    </div>
  </div>

  <script>
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      const target = document.getElementById(id);
      if (target) target.classList.add('active');
    }

    // ── localStorage constants ────────────────────────────────
    const LS_SETTINGS = 'mn_lastSettings';
    const LS_MUTED    = 'mn_muted';

    // ── Settings state ──────────────────────────────────────────
    let settings = {
      operation: 'multiply',
      numbers: [2, 3, 4, 6],
      sessionType: 'problems',
      sessionValue: 20,
      muted: false,
    };

    // ── Load settings from localStorage ─────────────────────────
    function loadSettings() {
      try {
        const raw = localStorage.getItem(LS_SETTINGS);
        if (raw) {
          const saved = JSON.parse(raw);
          if (['multiply','divide','mix'].includes(saved.operation)) {
            settings.operation = saved.operation;
          }
          if (Array.isArray(saved.numbers) && saved.numbers.length >= 2) {
            settings.numbers = saved.numbers.filter(n => Number.isInteger(n) && n >= 0 && n <= 12);
            if (settings.numbers.length < 2) settings.numbers = [2, 3, 4, 6];
          }
          if (['problems','time'].includes(saved.sessionType)) {
            settings.sessionType = saved.sessionType;
          }
          if (Number.isInteger(saved.sessionValue)) {
            if (settings.sessionType === 'problems') {
              settings.sessionValue = Math.min(50, Math.max(5, Math.round(saved.sessionValue / 5) * 5));
            } else {
              settings.sessionValue = Math.min(10, Math.max(1, saved.sessionValue));
            }
          }
        }
        const muted = localStorage.getItem(LS_MUTED);
        if (muted !== null) settings.muted = muted === 'true';
      } catch (_) {}
    }

    // ── Save settings to localStorage ───────────────────────────
    function saveSettings() {
      try {
        localStorage.setItem(LS_SETTINGS, JSON.stringify({
          operation:    settings.operation,
          numbers:      settings.numbers,
          sessionType:  settings.sessionType,
          sessionValue: settings.sessionValue,
        }));
        localStorage.setItem(LS_MUTED, settings.muted);
      } catch (_) {}
    }

    // ── Boot ─────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      loadSettings();
      renderNumberGrid();
      syncSettingsUI();
      // Event delegation for number grid — wired once at boot
      document.getElementById('number-grid').addEventListener('click', e => {
        const btn = e.target.closest('.num-btn');
        if (btn) toggleNumber(Number(btn.dataset.num));
      });
    });

    // ── Number grid ───────────────────────────────────────────────
    function renderNumberGrid() {
      const grid = document.getElementById('number-grid');
      grid.innerHTML = '';
      for (let n = 0; n <= 12; n++) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'num-btn' + (settings.numbers.includes(n) ? ' selected' : '');
        btn.textContent = n;
        btn.dataset.num = n;
        btn.setAttribute('aria-pressed', settings.numbers.includes(n) ? 'true' : 'false');
        grid.appendChild(btn);
      }
      updateDojoBtn();
    }

    function toggleNumber(n) {
      if (settings.numbers.includes(n)) {
        if (settings.numbers.length <= 2) return; // enforce minimum of 2
        settings.numbers = settings.numbers.filter(x => x !== n);
      } else {
        settings.numbers = [...settings.numbers, n].sort((a, b) => a - b);
      }
      renderNumberGrid();
      saveSettings();
    }

    function updateDojoBtn() {
      document.getElementById('dojo-btn').disabled = settings.numbers.length < 2;
    }

    // ── Sync UI to state ─────────────────────────────────────────
    function syncSettingsUI() {
      // Operation toggle
      document.querySelectorAll('#op-toggle .toggle-btn').forEach(btn => {
        const active = btn.dataset.op === settings.operation;
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-pressed', active ? 'true' : 'false');
      });
      // Session type toggle
      document.querySelectorAll('#st-toggle .toggle-btn').forEach(btn => {
        const active = btn.dataset.st === settings.sessionType;
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-pressed', active ? 'true' : 'false');
      });
      // Session value display
      const unit = settings.sessionType === 'time' ? ' min' : '';
      document.getElementById('session-display').textContent = settings.sessionValue + unit;
      // Sound
      document.getElementById('sound-icon').textContent = settings.muted ? '🔇' : '🔊';
      document.getElementById('sound-label').textContent = settings.muted ? 'Sound Off' : 'Sound On';
      document.getElementById('sound-toggle-row').setAttribute('aria-pressed', settings.muted ? 'true' : 'false');
    }

    // Wire operation buttons
    document.querySelectorAll('#op-toggle .toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        settings.operation = btn.dataset.op;
        syncSettingsUI();
        saveSettings();
      });
    });

    // Wire session type buttons
    document.querySelectorAll('#st-toggle .toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        settings.sessionType = btn.dataset.st;
        settings.sessionValue = btn.dataset.st === 'problems' ? 20 : 3;
        syncSettingsUI();
        saveSettings();
      });
    });

    // Wire stepper
    document.getElementById('stepper-minus').addEventListener('click', () => adjustSession(-1));
    document.getElementById('stepper-plus').addEventListener('click', () => adjustSession(1));

    function adjustSession(dir) {
      if (settings.sessionType === 'problems') {
        settings.sessionValue = Math.min(50, Math.max(5, settings.sessionValue + dir * 5));
      } else {
        settings.sessionValue = Math.min(10, Math.max(1, settings.sessionValue + dir));
      }
      syncSettingsUI();
      saveSettings();
    }

    // Wire sound toggle
    document.getElementById('sound-toggle-row').addEventListener('click', () => {
      settings.muted = !settings.muted;
      syncSettingsUI();
      saveSettings();
    });
  </script>

</body>
</html>
